name: Publish

on:
  workflow_dispatch:

# OIDC token is required for npm and JSR trusted publishing.
# Both registries exchange this token for short-lived credentials —
# no long-lived secrets are needed.
permissions:
  contents: read
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.14.0'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-npm:
    needs: test-and-build
    runs-on: ubuntu-latest
    # Requires manual approval via the "npm" environment in repo settings.
    # No NPM_TOKEN needed — authentication is handled via OIDC.
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.14.0'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      # NODE_AUTH_TOKEN must NOT be set — it disables OIDC authentication.
      - name: Publish to npm
        run: npm publish --access public --provenance

  publish-jsr:
    needs: test-and-build
    runs-on: ubuntu-latest
    # Requires manual approval via the "jsr" environment in repo settings.
    # JSR uses OIDC — no secret token is needed.
    environment: jsr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.14.0'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish to JSR
        run: npx jsr publish
